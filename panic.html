<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>You're Safe</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* MIDNIGHT AURORA THEME */
    :root {
      --bg-dark: #0a0e17;
      /* Deepest blue/black */
      --glass-bg: rgba(20, 25, 40, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f0f4f8;
      --text-muted: #8a9bb4;
      --brand-accent: #64ffda;
      /* Calming teal */
      --brand-accent-glow: rgba(100, 255, 218, 0.4);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
      /* Prevent scrolling during panic */
    }

    /* Global Particle Canvas */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      /* Let clicks pass through to UI */
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem 1.5rem;
    }

    /* Views */
    .view {
      display: none;
      width: 100%;
      max-width: 500px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .view.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* Typography */
    h1,
    h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      letter-spacing: -0.02em;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      margin-bottom: 1rem;
    }

    .technique-content h2 {
      margin-bottom: 0.5rem;
    }

    .technique-content .view-desc {
      margin-bottom: 0.75rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 4rem;
      font-weight: 300;
    }

    /* Glassmorphic Card - fixed height, no internal scroll */
    .technique-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 1.75rem 1.5rem 1.25rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-height: min(780px, 85dvh);
      min-height: 280px;
    }

    .technique-content {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      width: 100%;
    }

    .technique-card .actions {
      flex-shrink: 0;
      margin-top: 0.75rem;
      padding-top: 0.5rem;
    }

    .view-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    /* Standard Step Text */
    .steps {
      width: 100%;
    }

    .step-line {
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 0.5rem;
      color: var(--text-main);
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* Buttons */
    button {
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
    }

    .btn-panic {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      padding: 1.2rem 3rem;
      font-size: 1.2rem;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto;
    }

    .btn-panic:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    }

    .btn-panic svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      width: 100%;
      max-width: 250px;
      margin-bottom: 1rem;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 4px;
      padding: 0.5rem;
    }

    .btn-link:hover {
      color: var(--text-main);
      text-decoration-color: var(--glass-border);
    }

    .btn-icon {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-icon svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-icon.recording {
      background: #ff4757;
      color: #fff;
      border-color: #ff4757;
      animation: pulseRecord 1.5s infinite;
    }

    @keyframes pulseRecord {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);
      }

      70% {
        box-shadow: 0 0 0 15px rgba(255, 71, 87, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
      }
    }

    /* --- SPECIALIZED UI COMPONENTS --- */
    .technique-ui {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin: 1rem 0;
    }

    /* 1. Breathing Visualizer */
    .breath-container {
      position: relative;
      width: min(180px, 42vw);
      height: min(180px, 42vw);
      display: none;
      /* default hidden */
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .breath-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 180deg at 50% 50%, var(--brand-accent) 0deg, rgba(100, 255, 218, 0) 360deg);
      filter: blur(20px);
      opacity: 0.2;
      transition: all 0.3s ease;
    }

    .breath-circle::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
    }

    .breath-text {
      position: relative;
      z-index: 2;
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.3s;
    }

    /* Animations strictly logic bound */
    .breath-container.breathe-in .breath-circle {
      animation: expandCircle ease-in-out forwards;
    }

    .breath-container.breathe-out .breath-circle {
      animation: contractCircle ease-in-out forwards;
    }

    @keyframes expandCircle {
      0% {
        transform: scale(0.6);
        opacity: 0.2;
      }

      100% {
        transform: scale(1.2);
        opacity: 0.8;
      }
    }

    @keyframes contractCircle {
      0% {
        transform: scale(1.2);
        opacity: 0.8;
      }

      100% {
        transform: scale(0.6);
        opacity: 0.2;
      }
    }

    /* 2. Voice Release UI */
    .voice-container {
      width: 100%;
    }

    .voice-output {
      width: 100%;
      min-height: 90px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      line-height: 1.4;
      color: var(--text-main);
      margin-bottom: 1.25rem;
      transition: all 0.5s ease;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.3rem;
    }

    .voice-word {
      opacity: 0;
      animation: fadeUp 0.3s ease forwards;
      display: inline-block;
    }

    .voice-output.dissolving .voice-word {
      animation: dissolveWord 2s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
    }

    @keyframes dissolveWord {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0);
        filter: blur(0);
      }

      50% {
        opacity: 0.5;
        filter: blur(4px);
        letter-spacing: 5px;
      }

      100% {
        opacity: 0;
        transform: translateY(-40px) scale(1.2) rotate(5deg);
        filter: blur(10px);
        letter-spacing: 15px;
      }
    }

    /* 3. EMDR Bilateral Stimulation */
    .emdr-container {
      width: 100%;
      height: 80px;
      position: relative;
      margin-bottom: 1rem;
      display: none;
      /* Always hidden until activated by mode */
      align-items: center;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
    }

    /* NEW: Sleek glowing light beam instead of a basic circle */
    .emdr-light-beam {
      width: 6px;
      height: 140%;
      /* slightly taller than container for bleed effect */
      background: #ffffff;
      position: absolute;
      left: 0;
      top: -20%;
      border-radius: 10px;
      box-shadow:
        0 0 15px rgba(255, 255, 255, 0.8),
        0 0 30px var(--brand-accent),
        0 0 60px var(--brand-accent-glow),
        0 0 100px var(--brand-accent-glow);
      /* The translation is handled by JS for perfect sync */
    }

    /* Modifiers controlling visibility */
    .mode-breathing .ui-breathing {
      display: flex;
    }

    .mode-breathing .steps {
      display: none;
    }

    .mode-voice .ui-voice {
      display: flex;
    }

    .mode-voice .steps {
      display: none;
    }

    .mode-emdr .ui-emdr {
      display: flex;
    }

    .mode-emdr .steps {
      display: none;
    }

    /* Top logo mark */
    .top-mark {
      text-align: center;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeIn 1.5s ease 0.3s forwards;
    }

    .top-mark span {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .top-mark .accent-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand-accent);
      margin-right: 0.5rem;
      vertical-align: middle;
      box-shadow: 0 0 8px var(--brand-accent-glow);
    }

    /* Small phones */
    @media (max-height: 640px) {
      .technique-card {
        padding: 1.25rem 1.25rem 1rem;
      }

      .step-line {
        font-size: 0.9rem;
        margin-bottom: 0.35rem;
      }

      .breath-container {
        width: min(150px, 38vw);
        height: min(150px, 38vw);
      }

      .breath-text {
        font-size: 1.3rem;
      }

      .voice-output {
        min-height: 70px;
        font-size: 1.2rem;
        margin-bottom: 1rem;
      }

      .emdr-container {
        height: 65px;
      }

      .technique-ui {
        margin: 0.75rem 0;
      }

      .top-mark {
        margin-bottom: 0.75rem;
      }

      .top-mark span {
        font-size: 0.85rem;
      }
    }

    /* Very small phones */
    @media (max-height: 520px) {
      .technique-card {
        padding: 1rem 1rem 0.75rem;
        border-radius: 18px;
      }

      .technique-content h2 {
        font-size: 1.15rem;
        margin-bottom: 0.3rem;
      }

      .technique-content .view-desc {
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
      }

      .step-line {
        font-size: 0.85rem;
        line-height: 1.4;
        margin-bottom: 0.25rem;
      }

      .breath-container {
        width: min(120px, 32vw);
        height: min(120px, 32vw);
      }

      .breath-text {
        font-size: 1.1rem;
      }

      .top-mark {
        margin-bottom: 0.5rem;
      }
    }

    /* Swipe navigation */
    .swipe-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      width: 100%;
    }

    .swipe-hint {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.5rem;
      opacity: 0.6;
    }

    .nav-arrow {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-arrow:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .nav-arrow svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Swipe transition */
    .technique-card.swipe-out-left {
      animation: swipeOutLeft 0.3s ease forwards;
    }

    .technique-card.swipe-out-right {
      animation: swipeOutRight 0.3s ease forwards;
    }

    .technique-card.swipe-in-left {
      animation: swipeInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .technique-card.swipe-in-right {
      animation: swipeInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes swipeOutLeft {
      to {
        opacity: 0;
        transform: translateX(-60px);
      }
    }

    @keyframes swipeOutRight {
      to {
        opacity: 0;
        transform: translateX(60px);
      }
    }

    @keyframes swipeInLeft {
      from {
        opacity: 0;
        transform: translateX(60px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes swipeInRight {
      from {
        opacity: 0;
        transform: translateX(-60px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>

  <!-- Background Layer -->
  <canvas id="particle-canvas"></canvas>

  <div class="container">
    <div id="view-landing" class="view active">
      <h1>You're Safe</h1>
      <p class="subtitle">A quiet space to find your center</p>

      <button id="start-btn" class="btn-panic">
        <svg viewBox="0 0 24 24">
          <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"></path>
          <path d="M12 8v4"></path>
          <path d="M12 16h.01"></path>
        </svg>
        I need help right now
      </button>
    </div>

    <div id="view-technique" class="view">
      <div class="top-mark"><span><span class="accent-dot"></span>You're Safe</span></div>
      <div class="technique-card" id="main-card">
        <div class="technique-content">
          <h2 id="technique-title">Technique</h2>
          <p id="technique-desc" class="view-desc"></p>

          <div class="steps" id="technique-steps"></div>

          <div class="technique-ui ui-breathing breath-container" id="breath-container">
            <div class="breath-circle" id="breath-circle"></div>
            <div class="breath-text" id="breath-text">Breathe</div>
          </div>

          <div class="technique-ui ui-voice voice-container">
            <div class="voice-output" id="voice-output">
              Speak your thoughts aloud. Let them out.
            </div>
            <div style="display:flex; gap:1rem; justify-content:center;">
              <button id="record-btn" class="btn-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                  <line x1="12" x2="12" y1="19" y2="22" />
                  <line x1="8" x2="16" y1="22" y2="22" />
                </svg>
              </button>
              <button id="release-btn" class="btn-secondary"
                style="margin:0; max-width:150px; display:none;">Release</button>
            </div>
          </div>

          <div class="technique-ui ui-emdr emdr-container">
            <div class="emdr-light-beam" id="emdr-orb"></div>
          </div>
        </div>

        <div class="actions">
          <div class="swipe-nav">
            <button id="prev-btn" class="nav-arrow" aria-label="Previous technique">
              <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button id="back-link" class="btn-link">I feel better</button>
            <button id="next-btn" class="nav-arrow" aria-label="Next technique">
              <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
            </button>
          </div>
          <p class="swipe-hint">swipe or tap arrows</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- 1. PARTICLE PHYSICS ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let chaosLevel = 1.0;
    let targetChaosLevel = 1.0;

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
        this.size = Math.random() * 2 + 1; this.baseHue = 200;
      }
      update(chaos) {
        const speedMult = 0.5 + (chaos * 3);
        const erratic = chaos * 0.5;
        this.vx += (Math.random() - 0.5) * erratic;
        this.vy += (Math.random() - 0.5) * erratic;
        this.vx *= 0.99 - (0.05 * (1 - chaos));
        this.vy *= 0.99 - (0.05 * (1 - chaos));
        this.x += this.vx * speedMult;
        this.y += this.vy * speedMult;
        if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;
      }
      draw(chaos) {
        const hue = this.baseHue - (chaos * 30);
        const lightness = 30 + (chaos * 40);
        const opacity = 0.3 + (chaos * 0.4);
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 80%, ${lightness}%, ${opacity})`; ctx.fill();
      }
    }

    for (let i = 0; i < 150; i++) particles.push(new Particle());

    function animateParticles() {
      chaosLevel += (targetChaosLevel - chaosLevel) * 0.02;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (chaosLevel > 0.1) {
        const gradient = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${chaosLevel * 0.05})`);
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      particles.forEach(p => { p.update(chaosLevel); p.draw(chaosLevel); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('mousemove', (e) => {
      particles.forEach(p => {
        const dx = p.x - e.clientX; const dy = p.y - e.clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) { p.vx += (dx / dist) * 0.5; p.vy += (dy / dist) * 0.5; }
      });
    });

    // --- 2. TECHNIQUES DATA ---
    const techniques = [
      { type: "emdr", title: "Bilateral Eye Sweep", desc: "Follow the light with your eyes. Keep your head completely still. This helps your brain physically process stress.", steps: "" },
      { type: "voice", title: "Dissolving Thoughts", desc: "Speak your overwhelmed thoughts out loud. Get them out of your head, onto the screen, and watch them dissolve.", steps: "" },
      { type: "breathing", title: "Box Breathing", desc: "Follow the circle. Keep your eyes gently focused on it.", pattern: [{ action: "Breathe In", time: 4000 }, { action: "Hold", time: 4000 }, { action: "Breathe Out", time: 4000 }, { action: "Hold", time: 4000 }], steps: "" },
      { type: "breathing", title: "4-7-8 Breath", desc: "Follow the circle. Keep your eyes gently focused on it.", pattern: [{ action: "Breathe In", time: 4000 }, { action: "Hold", time: 7000 }, { action: "Breathe Out", time: 8000 }], steps: "" },
      { type: "standard", title: "Slow Exhale", desc: "Activate your body's rest response.", steps: "Breathe in normally.\nNow breathe out slowly — make it twice as long as the inhale.\n\nDo this 6 times.\nSlow exhales activate your body's rest response." },
      { type: "standard", title: "5-4-3-2-1 Grounding", desc: "Scan your environment carefully.", steps: "Name 5 things you can see.\nName 4 things you can physically feel.\nName 3 things you can hear.\nName 2 things you can smell.\nName 1 thing you can taste.\n\nTake your time with each one." },
      { type: "standard", title: "Feet on the Floor", desc: "Reconnect with gravity.", steps: "Press both feet flat on the floor.\nFeel the ground under you.\nNotice the texture, the temperature, the pressure.\n\nYou are here. You are supported.\nStay with this feeling for 30 seconds." },
      { type: "standard", title: "Hold Something Cold", desc: "Focus entirely on a single sensation.", steps: "Find something cold — ice, a cold drink, cold water.\nHold it in your hands.\nFocus entirely on the sensation.\n\nThe cold brings you back to the present moment.\nStay with it until your breathing slows." },
      { type: "standard", title: "Body Scan", desc: "Bring awareness back to your body.", steps: "Start at the top of your head.\nSlowly move your attention down through your body.\n\nNotice: forehead, jaw, shoulders, chest, stomach, hands, legs, feet.\n\nAt each part: notice the sensation. Don't try to change it." },
      { type: "standard", title: "Name What You See", desc: "Engage the logical part of your brain.", steps: "Look around and silently name 10 objects you can see.\n\nBe specific: not 'chair' but 'wooden chair with blue cushion'.\n\nThis pulls your brain out of panic and into the present." },
      { type: "standard", title: "Clench and Release", desc: "Release physical tension.", steps: "Make tight fists with both hands.\nHold for 5 seconds.\nRelease completely.\n\nNow tense your shoulders up to your ears.\nHold for 5 seconds.\nRelease.\n\nRepeat 3 times. Feel the difference." },
      { type: "standard", title: "Splash Cold Water", desc: "Trigger the mammalian dive reflex.", steps: "Go to a sink.\nSplash cold water on your face — especially your forehead and cheeks.\n\nThis triggers the dive reflex and slows your heart rate.\nPat your face dry slowly." },
      { type: "standard", title: "Run in Place", desc: "Burn off the adrenaline.", steps: "Run in place for 30 seconds.\nLet your body burn off the adrenaline.\n\nPanic primes your body to fight or flee.\nGive it somewhere to go.\n\nStop. Breathe. Notice how you feel." },
      { type: "standard", title: "Shake It Out", desc: "Release nervous energy.", steps: "Stand up if you can.\nShake your hands like you're flicking water off them.\nThen shake your arms. Your legs. Your whole body.\n\n30 seconds of shaking.\nAnimals do this after stress. It works." },
      { type: "standard", title: "This Will Pass", desc: "A reminder of impermanence.", steps: "A panic attack cannot last forever.\nYour body cannot sustain this level of arousal.\n\nThe average panic attack peaks in 10 minutes.\nYou have survived every single one before this.\n\nThis one will pass too." },
      { type: "standard", title: "Panic Is Not Danger", desc: "Reframe the physical sensations.", steps: "Panic feels like danger. It is not danger.\n\nYour heart is beating fast: that's adrenaline, not a heart attack.\nYou feel lightheaded: that's shallow breathing, not dying.\n\nThe alarm is loud. The alarm is wrong.\nYou are safe." },
      { type: "standard", title: "Name 3 True Facts", desc: "Anchor yourself with undeniable truths.", steps: "Say three things that are true right now.\n\nFor example:\n'I am sitting in my living room.'\n'It is Tuesday afternoon.'\n'I can hear cars outside.'\n\nFacts are an anchor. Use them." },
      { type: "standard", title: "What Would You Tell a Friend?", desc: "Practice self-compassion.", steps: "If your best friend was feeling exactly what you're feeling right now, what would you say to them?\n\nSay it to yourself.\nOut loud if you can.\n\nYou deserve the same compassion you'd give them." },
      { type: "standard", title: "You Have Done This Before", desc: "Draw on your past resilience.", steps: "Every panic attack you've ever had has ended.\n\nEvery single one.\n\nYou are still here.\nYou are stronger than this feeling.\n\nThis one ends too." },
      { type: "standard", title: "You Are Allowed to Slow Down", desc: "Give yourself permission to pause.", steps: "You don't have to keep going right now.\n\nYou are allowed to stop.\nYou are allowed to rest.\nYou are allowed to take up space.\n\nSlow down.\nYou have permission." },
      { type: "standard", title: "Soften Something", desc: "Release a tiny bit of resistance.", steps: "Notice where you're holding tension in your body.\nYour jaw? Your shoulders? Your hands?\n\nJust soften it slightly. You don't have to let go completely.\nJust a little softer.\n\nAnd breathe." },
      { type: "standard", title: "One Thing at a Time", desc: "Narrow your focus to right now.", steps: "You don't have to solve everything right now.\n\nYou only have to do one thing:\nGet through the next minute.\n\nThat's it.\nJust the next minute.\nYou can do that." }
    ];

    // --- APP LOGIC ---
    let deck = []; let index = 0;
    let history = []; let historyIndex = -1;
    function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }
    function nextTechnique() { if (index >= deck.length) { deck = shuffle(techniques); index = 0; } return deck[index++]; }

    function goNext() {
      // If we're in the middle of history, go forward
      if (historyIndex < history.length - 1) {
        historyIndex++;
        animateTransition('left', () => showTechniqueContent(history[historyIndex]));
      } else {
        const t = nextTechnique();
        history.push(t);
        historyIndex = history.length - 1;
        animateTransition('left', () => showTechniqueContent(t));
      }
    }

    function goPrev() {
      if (historyIndex > 0) {
        historyIndex--;
        animateTransition('right', () => showTechniqueContent(history[historyIndex]));
      }
    }

    function animateTransition(direction, callback) {
      const card = document.getElementById('main-card');
      const outClass = direction === 'left' ? 'swipe-out-left' : 'swipe-out-right';
      const inClass = direction === 'left' ? 'swipe-in-left' : 'swipe-in-right';

      card.classList.add(outClass);
      setTimeout(() => {
        card.classList.remove(outClass);
        callback();
        card.classList.add(inClass);
        setTimeout(() => card.classList.remove(inClass), 400);
      }, 250);
    }

    function showTechniqueContent(t) {
      targetChaosLevel = Math.max(0.1, targetChaosLevel - 0.25);
      cleanupCurrentTechnique();

      document.getElementById('technique-title').textContent = t.title;
      document.getElementById('technique-desc').textContent = t.desc;
      const card = document.getElementById('main-card');
      // Preserve any swipe animation classes
      const swipeClasses = [...card.classList].filter(c => c.startsWith('swipe-'));
      card.className = `technique-card mode-${t.type}`;
      swipeClasses.forEach(c => card.classList.add(c));

      if (t.type === 'breathing') setTimeout(() => runBreathingCycle(t.pattern), 600);
      else if (t.type === 'voice') initVoiceTechnique();
      else if (t.type === 'emdr') initEMDRTechnique();
      else {
        const stepsContainer = document.getElementById('technique-steps'); stepsContainer.innerHTML = '';
        const lines = t.steps.split('\n').filter(l => l.trim() !== '');
        lines.forEach((line, i) => { const p = document.createElement('div'); p.className = 'step-line'; p.textContent = line; p.style.animationDelay = `${i * 0.15 + 0.3}s`; stepsContainer.appendChild(p); });
      }
      switchView('view-technique');
    }

    // First technique (no animation)
    function showTechnique(t) {
      history = [t];
      historyIndex = 0;
      showTechniqueContent(t);
    }

    // --- SWIPE GESTURE ---
    (function initSwipe() {
      const card = document.getElementById('main-card');
      let startX = 0, startY = 0, tracking = false;

      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        tracking = true;
      }, { passive: true });

      card.addEventListener('touchend', (e) => {
        if (!tracking) return;
        tracking = false;
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        // Only count horizontal swipes (more horizontal than vertical, and at least 50px)
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) goNext();
          else goPrev();
        }
      }, { passive: true });
    })();

    function cleanupCurrentTechnique() { stopBreathingAnimation(); stopVoiceRecognition(); stopEMDR(); }
    function switchView(viewId) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(viewId).classList.add('active'); }

    // MODULES 
    let currentBreathTimer = null;
    function stopBreathingAnimation() { clearTimeout(currentBreathTimer); const container = document.getElementById('breath-container'); container.className = 'technique-ui ui-breathing breath-container'; document.getElementById('breath-circle').style.animationDuration = ''; }
    function runBreathingCycle(pattern, stepIndex = 0) {
      if (!document.getElementById('view-technique').classList.contains('active')) return;
      const step = pattern[stepIndex]; const container = document.getElementById('breath-container'); const text = document.getElementById('breath-text'); const circle = document.getElementById('breath-circle');
      text.style.opacity = 0; setTimeout(() => { text.textContent = step.action; text.style.opacity = 1; }, 150);
      container.className = 'technique-ui ui-breathing breath-container'; void container.offsetWidth;
      if (step.action === "Breathe In") { container.classList.add('breathe-in'); circle.style.animationDuration = `${step.time}ms`; } else if (step.action === "Breathe Out") { container.classList.add('breathe-out'); circle.style.animationDuration = `${step.time}ms`; } else { container.classList.add('hold'); circle.style.animationDuration = ''; }
      currentBreathTimer = setTimeout(() => { runBreathingCycle(pattern, (stepIndex + 1) % pattern.length); }, step.time);
    }

    let recognition = null; let isRecording = false;
    function initVoiceTechnique() {
      const output = document.getElementById('voice-output'); const btn = document.getElementById('record-btn'); const releaseBtn = document.getElementById('release-btn');
      output.innerHTML = "Speak your thoughts aloud. Let them out.<br><br><small style='opacity:0.6'>(Click the microphone)</small>"; output.classList.remove('dissolving'); btn.classList.remove('recording'); btn.style.display = 'flex'; releaseBtn.style.display = 'none';
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { output.innerHTML = "Voice Transcription not supported in this browser. Try writing things down on paper and destroying it."; btn.style.display = 'none'; return; }
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition; recognition = new SpeechRec(); recognition.continuous = true; recognition.interimResults = true;
      recognition.onresult = (e) => {
        let ft = '', it = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) ft += e.results[i][0].transcript; else it += e.results[i][0].transcript; }
        const text = ft || it; if (text.trim() !== '') { output.innerHTML = text.split(' ').map(w => `<span class="voice-word">${w}</span>`).join(' '); releaseBtn.style.display = 'block'; }
      };
      recognition.onend = () => { isRecording = false; btn.classList.remove('recording'); };
    }
    function toggleRecording() {
      const btn = document.getElementById('record-btn');
      if (isRecording) recognition.stop(); else { document.getElementById('voice-output').innerHTML = "..."; recognition.start(); btn.classList.add('recording'); isRecording = true; }
    }
    document.getElementById('record-btn').addEventListener('click', toggleRecording);
    document.getElementById('release-btn').addEventListener('click', () => {
      if (isRecording) toggleRecording(); targetChaosLevel = 0.1;
      const output = document.getElementById('voice-output'); const words = output.querySelectorAll('.voice-word');
      words.forEach((w, i) => { w.style.transitionDelay = `${i * 0.1}s`; });
      output.classList.add('dissolving'); document.getElementById('release-btn').style.display = 'none'; document.getElementById('record-btn').style.display = 'none';
      setTimeout(() => { output.innerHTML = "They are gone.<br>You are lighter now."; output.classList.remove('dissolving'); output.style.animation = 'fadeUp 1s ease forwards'; }, (words.length * 100) + 1500);
    });
    function stopVoiceRecognition() { if (recognition && isRecording) { recognition.stop(); isRecording = false; } }

    let audioCtx = null, oscillator = null, panner = null, emdrAnimFrame = null, emdrStartTime = 0;
    function initEMDRTechnique() {
      startBilateralAudio(); emdrStartTime = performance.now();
      const orb = document.getElementById('emdr-orb'); const container = document.querySelector('.emdr-container');
      function animateOrb(time) {
        const width = container.offsetWidth - 6; // beam is 6px wide
        const elapsed = time - emdrStartTime;
        const cycleDuration = 3000;
        const progress = (elapsed % cycleDuration) / cycleDuration;
        // Sine wave for smooth easing at edges
        const sineProgress = (Math.sin(progress * Math.PI * 2 - Math.PI / 2) + 1) / 2;

        const position = sineProgress * width;
        orb.style.transform = `translateX(${position}px)`;

        if (panner) panner.pan.value = (sineProgress * 2) - 1;

        emdrAnimFrame = requestAnimationFrame(animateOrb);
      }
      emdrAnimFrame = requestAnimationFrame(animateOrb);
    }
    function startBilateralAudio() {
      if (!audioCtx) {
        const A = window.AudioContext || window.webkitAudioContext;
        audioCtx = new A(); panner = audioCtx.createStereoPanner(); oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine'; oscillator.frequency.value = 40;
        const gainNode = audioCtx.createGain(); gainNode.gain.value = 0.1;
        oscillator.connect(panner); panner.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.start();
      } else if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    }
    function stopEMDR() {
      if (emdrAnimFrame) cancelAnimationFrame(emdrAnimFrame);
      if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
    }

    document.getElementById('start-btn').addEventListener('click', () => { showTechnique(nextTechnique()); });
    document.getElementById('next-btn').addEventListener('click', () => { goNext(); });
    document.getElementById('prev-btn').addEventListener('click', () => { goPrev(); });
    document.getElementById('back-link').addEventListener('click', (e) => { e.preventDefault(); cleanupCurrentTechnique(); switchView('view-landing'); });
  </script>
</body>
